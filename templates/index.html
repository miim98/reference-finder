<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>레퍼런스 찾기</title>
<style>
  :root {
    --bg: #f7f7fb; --card: #fff; --ink: #1a1a2e; --muted: #6b7280;
    --accent: #4f46e5; --accent-soft: #eef2ff; --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-size: 1.6rem; font-weight: 800; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; }

  .uploader {
    display: block; background: var(--card); border: 2px dashed var(--border);
    border-radius: 16px; padding: 24px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .uploader.drag { border-color: var(--accent); background: var(--accent-soft); }
  .uploader input { display: none; }
  .btn {
    display: inline-block; background: var(--accent); color: #fff; border: 0;
    padding: 11px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: .95rem;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: .85rem; margin-top: 10px; }
  #preview { max-width: 180px; max-height: 180px; border-radius: 12px; margin: 14px auto 0; display: none; }

  .status { margin: 20px 0; color: var(--muted); }
  .error {
    background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
    padding: 14px 16px; border-radius: 12px; margin: 20px 0;
  }

  .section { margin-top: 34px; }
  .section > h2 { font-size: 1.1rem; font-weight: 800; margin: 0 0 4px; }
  .section > .desc { color: var(--muted); font-size: .85rem; margin: 0 0 14px; }

  .masonry { columns: 5 160px; column-gap: 10px; }
  .masonry .card { display: block; margin: 0 0 10px; break-inside: avoid; }

  .card {
    position: relative; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; overflow: hidden; text-decoration: none;
    background: var(--accent-soft); border: 1px solid var(--border); color: var(--accent);
  }
  .card img { width: 100%; display: block; }
  .card .label { text-align: center; font-weight: 700; font-size: .74rem; padding: 8px; line-height: 1.35; }
  .card:hover { outline: 2px solid var(--accent); }

  .cols { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
  @media (max-width: 720px) { .cols { grid-template-columns: 1fr; } }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .panel h3 { font-size: .9rem; margin: 0 0 12px; color: var(--muted); font-weight: 700; }
  .kwlist { display: flex; flex-direction: column; gap: 8px; }
  .kwlist button {
    text-align: left; background: var(--bg); border: 1px solid var(--border); color: var(--ink);
    padding: 10px 13px; border-radius: 10px; font-weight: 700; font-size: .95rem; cursor: pointer;
  }
  .kwlist button:hover { border-color: var(--accent); }
  .kwlist button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .site-block { margin-bottom: 22px; }
  .site-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .site-head .name { font-weight: 800; font-size: 1rem; }
  .site-link { text-decoration: none; font-weight: 700; font-size: .8rem; color: var(--accent);
               background: var(--accent-soft); padding: 6px 11px; border-radius: 8px; }
  .site-link:hover { background: var(--accent); color: #fff; }
  .thumbs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  @media (max-width: 900px) { .thumbs { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 560px) { .thumbs { grid-template-columns: repeat(3, 1fr); } }
  .thumbs .card { aspect-ratio: 1/1; }
  .thumbs .card img { position: absolute; inset: 0; height: 100%; object-fit: cover; }
  .empty { color: var(--muted); font-size: .85rem; font-style: italic; padding: 8px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>레퍼런스 찾기</h1>
  <p class="sub">이미지를 올리면 ① 비슷한 이미지(웹 전체)와 ② 내 사이트별 키워드 레퍼런스를 함께 보여줍니다.</p>

  <form id="form">
    <label class="uploader" id="drop">
      <input type="file" id="file" accept="image/png,image/jpeg,image/gif,image/webp" />
      <span class="btn" id="pickBtn">이미지 선택</span>
      <div class="hint">또는 여기로 드래그 · PNG / JPEG / GIF / WebP · 최대 10MB</div>
      <img id="preview" alt="미리보기" />
    </label>
    <div style="margin-top:16px; text-align:center;">
      <button class="btn" id="submit" type="submit" disabled>분석하기</button>
    </div>
  </form>

  <div id="status" class="status" style="display:none;"></div>
  <div id="error" class="error" style="display:none;"></div>

  <!-- ① 비슷한 이미지 (웹 전체) -->
  <div class="section" id="simSection" style="display:none;">
    <h2>① 비슷한 이미지</h2>
    <p class="desc">이 이미지와 시각적으로 비슷한 이미지 (웹 전체). 클릭하면 원본 페이지로 이동합니다.</p>
    <div class="masonry" id="simGrid"></div>
    <div class="empty" id="simEmpty" style="display:none;">비슷한 이미지를 찾지 못했습니다.</div>
  </div>

  <!-- ② 내 사이트별 키워드 레퍼런스 -->
  <div class="section" id="kwSection" style="display:none;">
    <h2>② 내 사이트에서 찾기</h2>
    <p class="desc">키워드를 누르면 등록한 사이트별 상위 이미지 10개씩을 보여줍니다.</p>
    <div class="cols">
      <div class="panel">
        <h3>키워드 (클릭)</h3>
        <div class="kwlist" id="kwlist"></div>
      </div>
      <div class="panel">
        <h3 id="rightTitle">레퍼런스</h3>
        <div id="right"><div class="empty">왼쪽 키워드를 클릭하세요.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const fileInput = $("file"), drop = $("drop"), pickBtn = $("pickBtn"), preview = $("preview");
  const submitBtn = $("submit"), form = $("form"), statusEl = $("status"), errorEl = $("error");
  const simSection = $("simSection"), simGrid = $("simGrid"), simEmpty = $("simEmpty");
  const kwSection = $("kwSection"), kwlist = $("kwlist"), rightEl = $("right"), rightTitle = $("rightTitle");

  pickBtn.addEventListener("click", (e) => { e.preventDefault(); fileInput.click(); });
  function showPreview(f) {
    if (!f) return;
    const r = new FileReader();
    r.onload = (e) => { preview.src = e.target.result; preview.style.display = "block"; };
    r.readAsDataURL(f); submitBtn.disabled = false;
  }
  fileInput.addEventListener("change", () => showPreview(fileInput.files[0]));
  ["dragenter","dragover"].forEach((ev)=>drop.addEventListener(ev,(e)=>{e.preventDefault();drop.classList.add("drag");}));
  ["dragleave","drop"].forEach((ev)=>drop.addEventListener(ev,(e)=>{e.preventDefault();drop.classList.remove("drag");}));
  drop.addEventListener("drop",(e)=>{const f=e.dataTransfer.files[0]; if(f){fileInput.files=e.dataTransfer.files; showPreview(f);}});

  function esc(s){return String(s).replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

  function renderSimilar(imgs) {
    simSection.style.display = "block";
    if (!imgs || !imgs.length) { simGrid.innerHTML=""; simEmpty.style.display="block"; return; }
    simEmpty.style.display = "none";
    simGrid.innerHTML = imgs.map((im) =>
      `<a class="card" href="${esc(im.link)}" target="_blank" rel="noopener" title="${esc(im.title||'')}">
         <img src="${esc(im.image)}" alt="" loading="lazy" onerror="this.closest('.card').remove()" /></a>`).join("");
  }

  async function loadReferences(keyword, btn) {
    document.querySelectorAll(".kwlist button").forEach((b)=>b.classList.remove("active"));
    if (btn) btn.classList.add("active");
    rightTitle.textContent = `"${keyword}" 레퍼런스`;
    rightEl.innerHTML = '<div class="empty">불러오는 중…</div>';
    try {
      const res = await fetch("/api/references?keyword=" + encodeURIComponent(keyword));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "요청 실패");
      rightEl.innerHTML = (data.sites || []).map((s) => {
        let cards;
        if (s.images && s.images.length) {
          cards = s.images.map((im) =>
            `<a class="card" href="${esc(im.link)}" target="_blank" rel="noopener">
               <img src="${esc(im.image)}" alt="" loading="lazy" onerror="this.remove()" /></a>`).join("");
        } else {
          cards = `<a class="card" href="${esc(s.search_url)}" target="_blank" rel="noopener">
               <span class="label">${esc(s.name)}<br>검색 결과 열기 ↗</span></a>`;
        }
        return `<div class="site-block">
            <div class="site-head"><span class="name">${esc(s.name)}</span>
              <a class="site-link" href="${esc(s.search_url)}" target="_blank" rel="noopener">🔍 검색 열기 ↗</a></div>
            <div class="thumbs">${cards}</div></div>`;
      }).join("") || '<div class="empty">등록된 사이트가 없습니다.</div>';
    } catch (err) {
      rightEl.innerHTML = `<div class="empty">⚠️ ${esc(err.message)}</div>`;
    }
  }

  function renderKeywords(keywords, kwError) {
    kwSection.style.display = "block";
    kwlist.innerHTML = "";
    if (!keywords || !keywords.length) {
      kwlist.innerHTML = `<div class="empty">${esc(kwError || "키워드를 뽑지 못했습니다.")}</div>`;
      rightEl.innerHTML = '<div class="empty">—</div>';
      return;
    }
    keywords.forEach((k) => {
      const btn = document.createElement("button");
      btn.textContent = k;
      btn.addEventListener("click", () => loadReferences(k, btn));
      kwlist.appendChild(btn);
    });
    kwlist.firstChild.click();
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!fileInput.files[0]) return;
    errorEl.style.display = "none";
    simSection.style.display = "none"; kwSection.style.display = "none";
    submitBtn.disabled = true;
    statusEl.style.display = "block";
    statusEl.textContent = "이미지 분석 중… (비슷한 이미지 + 키워드)";

    const fd = new FormData(); fd.append("image", fileInput.files[0]);
    try {
      const res = await fetch("/api/analyze", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "요청 실패");
      renderSimilar(data.similar);
      renderKeywords(data.keywords, data.keyword_error);
    } catch (err) {
      errorEl.textContent = "⚠️ " + err.message;
      errorEl.style.display = "block";
    } finally {
      statusEl.style.display = "none";
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
