<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>레퍼런스 찾기 — 키워드 추출</title>
<style>
  :root {
    --bg: #f7f7fb; --card: #fff; --ink: #1a1a2e; --muted: #6b7280;
    --accent: #4f46e5; --accent-soft: #eef2ff; --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-size: 1.6rem; font-weight: 800; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 28px; }

  .uploader {
    display: block; background: var(--card); border: 2px dashed var(--border);
    border-radius: 16px; padding: 28px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .uploader.drag { border-color: var(--accent); background: var(--accent-soft); }
  .uploader input { display: none; }
  .btn {
    display: inline-block; background: var(--accent); color: #fff; border: 0;
    padding: 11px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: .95rem;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: .85rem; margin-top: 10px; }
  #preview { max-width: 220px; max-height: 220px; border-radius: 12px; margin: 16px auto 0; display: none; }

  .status { margin: 24px 0; color: var(--muted); }
  .error {
    background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
    padding: 14px 16px; border-radius: 12px; margin: 24px 0;
  }

  .result { margin-top: 32px; background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 22px 24px; display: none; }
  .result h2 { font-size: 1rem; margin: 0 0 14px; color: var(--muted); font-weight: 700; }
  .tags { display: flex; flex-wrap: wrap; gap: 10px; }
  .tag { background: var(--accent-soft); color: var(--accent); font-weight: 700;
         padding: 8px 16px; border-radius: 999px; font-size: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>레퍼런스 찾기</h1>
  <p class="sub">이미지를 올리면 핵심 키워드 5개를 뽑아 드립니다.</p>

  <form id="form">
    <label class="uploader" id="drop">
      <input type="file" id="file" accept="image/png,image/jpeg,image/gif,image/webp" />
      <span class="btn" id="pickBtn">이미지 선택</span>
      <div class="hint">또는 여기로 드래그 · PNG / JPEG / GIF / WebP · 최대 10MB</div>
      <img id="preview" alt="미리보기" />
    </label>
    <div style="margin-top:16px; text-align:center;">
      <button class="btn" id="submit" type="submit" disabled>키워드 뽑기</button>
    </div>
  </form>

  <div id="status" class="status" style="display:none;"></div>
  <div id="error" class="error" style="display:none;"></div>

  <div id="result" class="result">
    <h2>뽑힌 키워드</h2>
    <div class="tags" id="tags"></div>
  </div>
</div>

<script>
  const fileInput = document.getElementById("file");
  const drop = document.getElementById("drop");
  const pickBtn = document.getElementById("pickBtn");
  const preview = document.getElementById("preview");
  const submitBtn = document.getElementById("submit");
  const form = document.getElementById("form");
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error");
  const resultEl = document.getElementById("result");
  const tagsEl = document.getElementById("tags");

  pickBtn.addEventListener("click", (e) => { e.preventDefault(); fileInput.click(); });

  function showPreview(f) {
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (e) => { preview.src = e.target.result; preview.style.display = "block"; };
    reader.readAsDataURL(f);
    submitBtn.disabled = false;
  }
  fileInput.addEventListener("change", () => showPreview(fileInput.files[0]));

  ["dragenter", "dragover"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); }));
  ["dragleave", "drop"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); }));
  drop.addEventListener("drop", (e) => {
    const f = e.dataTransfer.files[0];
    if (f) { fileInput.files = e.dataTransfer.files; showPreview(f); }
  });

  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!fileInput.files[0]) return;
    errorEl.style.display = "none";
    resultEl.style.display = "none";
    submitBtn.disabled = true;
    statusEl.style.display = "block";
    statusEl.textContent = "이미지 분석 중…";

    const fd = new FormData();
    fd.append("image", fileInput.files[0]);
    try {
      const res = await fetch("/api/keywords", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "요청 실패");
      tagsEl.innerHTML = (data.keywords || [])
        .map((k) => `<span class="tag">${esc(k)}</span>`).join("");
      resultEl.style.display = "block";
    } catch (err) {
      errorEl.textContent = "⚠️ " + err.message;
      errorEl.style.display = "block";
    } finally {
      statusEl.style.display = "none";
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
