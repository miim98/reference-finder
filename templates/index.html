<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>레퍼런스 찾기</title>
<style>
  :root {
    --bg: #f7f7fb; --card: #fff; --ink: #1a1a2e; --muted: #6b7280;
    --accent: #4f46e5; --accent-soft: #eef2ff; --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-size: 1.6rem; font-weight: 800; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; }

  .uploader {
    display: block; background: var(--card); border: 2px dashed var(--border);
    border-radius: 16px; padding: 24px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .uploader.drag { border-color: var(--accent); background: var(--accent-soft); }
  .uploader input { display: none; }
  .btn {
    display: inline-block; background: var(--accent); color: #fff; border: 0;
    padding: 11px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: .95rem;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: .85rem; margin-top: 10px; }
  #preview { max-width: 180px; max-height: 180px; border-radius: 12px; margin: 14px auto 0; display: none; }

  .status { margin: 20px 0; color: var(--muted); }
  .error {
    background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
    padding: 14px 16px; border-radius: 12px; margin: 20px 0;
  }

  /* 2단 레이아웃 */
  .cols { display: grid; grid-template-columns: 260px 1fr; gap: 20px; margin-top: 28px; display: none; }
  @media (max-width: 720px) { .cols { grid-template-columns: 1fr; } }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .panel h2 { font-size: .95rem; margin: 0 0 14px; color: var(--muted); font-weight: 700; }

  .kwlist { display: flex; flex-direction: column; gap: 8px; }
  .kwlist button {
    text-align: left; background: var(--bg); border: 1px solid var(--border); color: var(--ink);
    padding: 11px 14px; border-radius: 10px; font-weight: 700; font-size: .98rem; cursor: pointer;
    transition: all .12s;
  }
  .kwlist button:hover { border-color: var(--accent); }
  .kwlist button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .sites { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .site-link {
    text-decoration: none; font-weight: 700; font-size: .85rem; color: var(--accent);
    background: var(--accent-soft); padding: 8px 13px; border-radius: 8px;
  }
  .site-link:hover { background: var(--accent); color: #fff; }

  .thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  @media (max-width: 480px) { .thumbs { grid-template-columns: repeat(2, 1fr); } }
  .thumb { display: block; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden;
           background: #eef1f5; border: 1px solid var(--border); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb:hover { outline: 2px solid var(--accent); }
  .empty { color: var(--muted); font-size: .85rem; font-style: italic; padding: 8px 0; }
  .imglabel { font-size: .8rem; color: var(--muted); margin: 4px 0 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>레퍼런스 찾기</h1>
  <p class="sub">이미지를 올리면 키워드 5개를 뽑고, 키워드를 누르면 관련 레퍼런스를 보여줍니다.</p>

  <form id="form">
    <label class="uploader" id="drop">
      <input type="file" id="file" accept="image/png,image/jpeg,image/gif,image/webp" />
      <span class="btn" id="pickBtn">이미지 선택</span>
      <div class="hint">또는 여기로 드래그 · PNG / JPEG / GIF / WebP · 최대 10MB</div>
      <img id="preview" alt="미리보기" />
    </label>
    <div style="margin-top:16px; text-align:center;">
      <button class="btn" id="submit" type="submit" disabled>키워드 뽑기</button>
    </div>
  </form>

  <div id="status" class="status" style="display:none;"></div>
  <div id="error" class="error" style="display:none;"></div>

  <div class="cols" id="cols">
    <div class="panel">
      <h2>키워드 (클릭)</h2>
      <div class="kwlist" id="kwlist"></div>
    </div>
    <div class="panel">
      <h2 id="rightTitle">레퍼런스</h2>
      <div id="right"><div class="empty">왼쪽 키워드를 클릭하세요.</div></div>
    </div>
  </div>
</div>

<script>
  const fileInput = document.getElementById("file");
  const drop = document.getElementById("drop");
  const pickBtn = document.getElementById("pickBtn");
  const preview = document.getElementById("preview");
  const submitBtn = document.getElementById("submit");
  const form = document.getElementById("form");
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error");
  const cols = document.getElementById("cols");
  const kwlist = document.getElementById("kwlist");
  const rightEl = document.getElementById("right");
  const rightTitle = document.getElementById("rightTitle");

  pickBtn.addEventListener("click", (e) => { e.preventDefault(); fileInput.click(); });

  function showPreview(f) {
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (e) => { preview.src = e.target.result; preview.style.display = "block"; };
    reader.readAsDataURL(f);
    submitBtn.disabled = false;
  }
  fileInput.addEventListener("change", () => showPreview(fileInput.files[0]));
  ["dragenter", "dragover"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); }));
  ["dragleave", "drop"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); }));
  drop.addEventListener("drop", (e) => {
    const f = e.dataTransfer.files[0];
    if (f) { fileInput.files = e.dataTransfer.files; showPreview(f); }
  });

  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  async function loadReferences(keyword, btn) {
    document.querySelectorAll(".kwlist button").forEach((b) => b.classList.remove("active"));
    if (btn) btn.classList.add("active");
    rightTitle.textContent = `"${keyword}" 레퍼런스`;
    rightEl.innerHTML = '<div class="empty">불러오는 중…</div>';
    try {
      const res = await fetch("/api/references?keyword=" + encodeURIComponent(keyword));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "요청 실패");

      const siteLinks = (data.sites || [])
        .map((s) => `<a class="site-link" href="${esc(s.search_url)}" target="_blank" rel="noopener">🔍 ${esc(s.name)}</a>`)
        .join("");

      let imgHtml;
      if (data.images && data.images.length) {
        imgHtml =
          '<div class="imglabel">관련 이미지</div><div class="thumbs">' +
          data.images.map((im) =>
            `<a class="thumb" href="${esc(im.link)}" target="_blank" rel="noopener" title="${esc(im.title)}">
               <img src="${esc(im.image)}" alt="${esc(im.title)}" loading="lazy"
                    onerror="this.closest('.thumb').style.display='none'" /></a>`).join("") +
          "</div>";
      } else if (data.images_enabled) {
        imgHtml = '<div class="empty">관련 이미지를 찾지 못했습니다.</div>';
      } else {
        imgHtml = '<div class="empty">이미지를 보려면 PEXELS_API_KEY가 필요합니다. (위 사이트 검색은 바로 됩니다)</div>';
      }

      rightEl.innerHTML = `<div class="sites">${siteLinks}</div>${imgHtml}`;
    } catch (err) {
      rightEl.innerHTML = `<div class="empty">⚠️ ${esc(err.message)}</div>`;
    }
  }

  function renderKeywords(keywords) {
    kwlist.innerHTML = "";
    keywords.forEach((k) => {
      const btn = document.createElement("button");
      btn.textContent = k;
      btn.addEventListener("click", () => loadReferences(k, btn));
      kwlist.appendChild(btn);
    });
    rightTitle.textContent = "레퍼런스";
    rightEl.innerHTML = '<div class="empty">왼쪽 키워드를 클릭하세요.</div>';
    cols.style.display = "grid";
    // 첫 키워드 자동 선택
    if (keywords.length) kwlist.firstChild.click();
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!fileInput.files[0]) return;
    errorEl.style.display = "none";
    cols.style.display = "none";
    submitBtn.disabled = true;
    statusEl.style.display = "block";
    statusEl.textContent = "이미지 분석 중…";

    const fd = new FormData();
    fd.append("image", fileInput.files[0]);
    try {
      const res = await fetch("/api/keywords", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "요청 실패");
      renderKeywords(data.keywords || []);
    } catch (err) {
      errorEl.textContent = "⚠️ " + err.message;
      errorEl.style.display = "block";
    } finally {
      statusEl.style.display = "none";
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
