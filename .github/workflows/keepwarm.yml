name: keep-warm

# Render 무료 플랜은 15분 미사용 시 잠들어 첫 접속이 느려진다.
# 10분마다 사이트를 한 번 찔러 인스턴스를 깨어있게 유지한다.
on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (GitHub 스케줄은 몇 분 지연될 수 있음)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://reference-finder-dktr.onrender.com/ || echo "000")
          echo "HTTP $code"
